<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Online Examination System</title>
    <style>
        body { font-family: Arial; background:#f4f4f4; text-align:center; }
        .container { width:70%; margin:auto; background:white; padding:20px; margin-top:20px; border-radius:10px; box-shadow:0 0 10px gray; }
        .question { text-align:left; margin:15px 0; }
        button { padding:8px 15px; margin:10px; background:green; color:white; border:none; border-radius:5px; cursor:pointer; }
        input { padding:5px; margin:5px; }
        #timer { font-weight:bold; color:red; font-size:18px; }
        .correct { color:green; }
        .wrong { color:red; }
    </style>
</head>
<body>

<div class="container" id="main"></div>

<script>
let main = document.getElementById("main");

let questions = [
{q:"1. What is 5 + 3?", options:["6","8","9"], answer:"8"},
{q:"2. HTML stands for?", options:["Hyper Text Markup Language","High Text Machine Language","Home Tool Markup Language"], answer:"Hyper Text Markup Language"},
{q:"3. CSS is used for?", options:["Structure","Styling","Database"], answer:"Styling"},
{q:"4. JavaScript is used for?", options:["Interactivity","Cooking","Painting"], answer:"Interactivity"},
{q:"5. Which symbol is comment in JS?", options:["//","##","**"], answer:"//"},
{q:"6. SQL stands for?", options:["Structured Query Language","Simple Question Language","Style Query Language"], answer:"Structured Query Language"},
{q:"7. Which company developed Java?", options:["Google","Sun Microsystems","Apple"], answer:"Sun Microsystems"},
{q:"8. Which loop in Java?", options:["for","repeat","loop"], answer:"for"},
{q:"9. Method to print in Java?", options:["echo()","print()","System.out.println()"], answer:"System.out.println()"},
{q:"10. Which tag for paragraph?", options:["p","h1","div"], answer:"p"}
];

function showLogin(){
main.innerHTML = `
<h2>Student Login</h2>
<input type="text" id="username" placeholder="Enter Name"><br>
<button onclick="startExam()">Start Exam</button>
<button onclick="viewHistory()">View Result History</button>
`;
}

function startExam(){
let username = document.getElementById("username").value;
if(username==""){ alert("Enter name"); return; }

localStorage.setItem("currentUser", username);

let examHTML = `<h2>Online Examination</h2>
<div id="timer">Time Left: 120 seconds</div>
<form id="examForm">`;

questions.forEach((item,index)=>{
examHTML += `<div class="question">
<p>${item.q}</p>`;
item.options.forEach(opt=>{
examHTML += `<input type="radio" name="q${index}" value="${opt}"> ${opt}<br>`;
});
examHTML += `</div>`;
});

examHTML += `<button type="button" onclick="submitExam()">Submit Exam</button></form>`;
main.innerHTML = examHTML;

startTimer();
}

let timeLeft = 120;
let timer;

function startTimer(){
timer = setInterval(function(){
timeLeft--;
document.getElementById("timer").innerHTML = "Time Left: " + timeLeft + " seconds";
if(timeLeft<=0){
clearInterval(timer);
submitExam();
}
},1000);
}

function submitExam(){
clearInterval(timer);
let score = 0;
let reviewHTML = "<h2>Result</h2>";
let user = localStorage.getItem("currentUser");

questions.forEach((item,index)=>{
let selected = document.querySelector(`input[name="q${index}"]:checked`);
if(selected){
if(selected.value === item.answer){
score++;
reviewHTML += `<p class="correct">${item.q} ✔ Correct</p>`;
}else{
reviewHTML += `<p class="wrong">${item.q} ✘ Wrong (Correct: ${item.answer})</p>`;
}
}else{
reviewHTML += `<p class="wrong">${item.q} ✘ Not Attempted (Correct: ${item.answer})</p>`;
}
});

reviewHTML += `<h3>Your Score: ${score} / ${questions.length}</h3>
<button onclick="showLogin()">Go Home</button>`;

main.innerHTML = reviewHTML;

// Save Result in Local Storage
let results = JSON.parse(localStorage.getItem("results")) || [];
results.push({name:user, score:score, total:questions.length, date:new Date().toLocaleString()});
localStorage.setItem("results", JSON.stringify(results));
}

function viewHistory(){
let results = JSON.parse(localStorage.getItem("results")) || [];
if(results.length==0){
alert("No results found");
return;
}
let historyHTML = "<h2>Result History</h2>";
results.forEach(r=>{
historyHTML += `<p>Name: ${r.name} | Score: ${r.score}/${r.total} | Date: ${r.date}</p>`;
});
historyHTML += `<button onclick="showLogin()">Go Home</button>`;
main.innerHTML = historyHTML;
}

showLogin();
</script>

</body>
</html>
